<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:#D8C7A1;font-family:'Times New Roman',Georgia,serif;color:#1a1007;}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:rgba(115,24,31,.08)}::-webkit-scrollbar-thumb{background:#73181F;border-radius:3px}
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 0;position:relative;}
.bg-overlay{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(115,24,31,.07) 0%,transparent 65%),repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(0,0,0,.012) 40px,rgba(0,0,0,.012) 80px);pointer-events:none;z-index:0;}
/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:#0c0805;display:flex;align-items:center;justify-content:center;transition:opacity 1.2s ease;}
#splash.fade{opacity:0;pointer-events:none;}
/* FRAME */
.frame{background:#D8C7A1;border:3px solid #73181F;border-radius:12px;padding:28px 46px;width:min(620px,95vw);text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.18),inset 0 0 50px rgba(115,24,31,.03);position:relative;z-index:1;}
/* BTN */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 18px;border-radius:8px;font-weight:bold;font-size:.9rem;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all .2s;border:2px solid #73181F;}
.btn:hover:not(:disabled){filter:brightness(1.15);transform:scale(1.02);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:#73181F;color:white;}
.btn-secondary{background:transparent;color:#1a1007;}
/* BADGE */
.badge{background:#73181F;color:white;padding:2px 8px;border-radius:5px;font-size:.7rem;font-weight:bold;}
/* CHOICE CARD */
.cc-card{border:1.5px solid #84785E;background:rgba(255,255,255,.3);padding:13px;margin-bottom:8px;border-radius:6px;cursor:pointer;transition:all .2s;}
.cc-card:hover{background:rgba(115,24,31,.06);}
.cc-card.sel{border:2px solid #73181F;background:rgba(115,24,31,.1);}
.cc-card.dis{opacity:.4;cursor:not-allowed;}
/* INPUT */
.input-line{width:100%;background:rgba(0,0,0,.04);border:none;border-left:3px solid #73181F;padding:9px 10px;font-family:'Times New Roman',serif;font-size:1rem;color:#1a1007;outline:none;margin-bottom:8px;}
/* MENU CONTAINER */
.menu-c{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px;margin:0 auto;}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:9999;}
.modal{background:#D8C7A1;border:2px solid #73181F;border-radius:10px;padding:26px;max-width:460px;width:90%;box-shadow:0 10px 30px rgba(0,0,0,.5);}
/* BAR */
.bar-outer{position:relative;height:26px;border-radius:6px;overflow:hidden;border:1px solid rgba(0,0,0,.25);box-shadow:inset 0 2px 4px rgba(0,0,0,.35);margin-bottom:8px;}
.bar-inner{height:100%;transition:width .5s ease-out;}
.bar-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:.88rem;text-shadow:1px 1px 2px #000;letter-spacing:1px;}
/* DOT */
.dot{width:13px;height:13px;border-radius:50%;cursor:pointer;border:1.5px solid #73181F;transition:all .2s;flex-shrink:0;display:inline-block;background:transparent;}
.dot.on{background:#73181F;box-shadow:0 0 5px #73181F;}
/* TOGGLE */
.toggle-wrap{position:relative;display:inline-block;width:44px;height:24px;cursor:pointer;flex-shrink:0;}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;border-radius:24px;transition:.3s;background:#ccc;}
.toggle-wrap input:checked+.toggle-track{background:#73181F;}
.toggle-knob{position:absolute;height:18px;width:18px;bottom:3px;left:3px;border-radius:50%;background:white;transition:.3s;}
.toggle-wrap input:checked~.toggle-knob{left:23px;}
/* CHAR CARD */
.char-card{background:rgba(196,176,138,.3);border:2px solid #73181F;border-radius:10px;padding:14px 18px;cursor:pointer;transition:all .18s;margin-bottom:10px;}
.char-card:hover{background:rgba(196,176,138,.6);transform:translateX(3px);}
/* EQUIP CARD */
.equip-card{padding:13px;margin-bottom:8px;border-radius:6px;border:1.5px solid #84785E;background:rgba(255,255,255,.3);}
.equip-card.sel{border:2px solid #73181F;background:rgba(115,24,31,.1);}
/* SMALL BTN */
.sm-btn{border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-weight:bold;font-size:1.1rem;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;background:#73181F;color:white;}
.sm-btn:disabled{background:#ccc;cursor:not-allowed;}
/* SECTION HDR */
.sec-hdr{font-weight:bold;color:#73181F;letter-spacing:2px;font-size:.8rem;margin:14px 0 5px;border-bottom:1px solid rgba(115,24,31,.2);padding-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
/* SHEET tab btn */
.tab-btn{padding:7px 15px;border:2px solid #73181F;border-radius:6px;background:transparent;color:#1a1007;cursor:pointer;font-family:inherit;font-weight:bold;font-size:.82rem;letter-spacing:1px;transition:all .2s;}
.tab-btn.active{background:#73181F;color:white;}
/* CARD INFO */
.card{background:rgba(196,176,138,.45);border:2px solid #73181F;border-radius:10px;padding:15px;margin-bottom:12px;text-align:left;}
</style>
</head>

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function calcStats(o){
  let v=5,i=5,m=5;
  ['lineage','childhood','profession'].forEach(k=>{
    if(o[k]){v+=o[k].vig||0;i+=o[k].ins||0;m+=o[k].min||0;}
  });
  return{vig:v,ins:i,min:m};
}
function calcCombat(names=[]){
  let d=1,p=0;
  if(names.includes('Arma semplice'))d+=2;
  if(names.includes('Arma letale'))d+=3;
  if(names.includes('Armi a distanza leggere'))d+=1;
  if(names.includes('Armi a distanza medie'))d+=2;
  if(names.includes('Armi a distanza pesanti'))d+=4;
  if(names.includes('Protezione a mano'))p+=1;
  if(names.includes('Protezione leggera'))p+=1;
  if(names.includes('Protezione media'))p+=2;
  if(names.includes('Protezione pesante'))p+=3;
  return{dmg:d,prot:p};
}
function parseSlotCost(str){
  if(!str||String(str)==='0')return 0;
  const m1=String(str).match(/^(\d+)\s*=\s*1\s*slot/i);
  if(m1)return 1/parseInt(m1[1]);
  const m2=String(str).match(/^([\d.]+)\s*slot/i);
  if(m2)return parseFloat(m2[1]);
  if(!isNaN(parseFloat(str)))return parseFloat(str);
  return 0;
}
function checkTalentReqs(t,stats,level,talentsList){
  const r=t.talent_req||{};
  if(r.level&&level<r.level)return`Richiede Livello ${r.level}`;
  if(r.vig&&stats.vig<r.vig)return`Richiede VIG ${r.vig} (hai ${stats.vig})`;
  if(r.ist&&stats.ins<r.ist)return`Richiede IST ${r.ist} (hai ${stats.ins})`;
  if(r.men&&stats.min<r.men)return`Richiede MEN ${r.men} (hai ${stats.min})`;
  if(r.talent&&!talentsList.some(x=>x.talent_name===r.talent))return`Richiede "${r.talent}"`;
  return null;
}
function fmtSlots(n){return n%1===0?String(n):n.toFixed(2).replace(/0+$/,'');}

// save/load
function persist(){
  if(!S.loaded)return;
  try{
    localStorage.setItem('saga-characters',JSON.stringify(S.chars));
    localStorage.setItem('saga-sessions',JSON.stringify(S.sessions));
    localStorage.setItem('saga-settings',JSON.stringify(S.settings));
  }catch(e){}
}
function load(){
  try{
    const c=localStorage.getItem('saga-characters');if(c)S.chars=JSON.parse(c);
    const s=localStorage.getItem('saga-sessions');if(s)S.sessions=JSON.parse(s);
    const st=localStorage.getItem('saga-settings');if(st)S.settings=JSON.parse(st);
  }catch(e){}
  S.loaded=true;
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function nav(page,params={}){
  // close 3D dice overlay if open
  if(S.diceOv){const ov=document.getElementById('dice-overlay');if(ov)ov.style.display='none';S.diceOv=null;_destroyDiceThree();}
  S.page=page;S.params=params;
  if(page==='create')S.cc=initCC();
  else if(page==='sheet'){const ch=S.chars.find(c=>c.id===params.charId);S.sh=ch?initSH(ch):null;}
  else if(page==='levelup')S.lu=initLU();
  window.scrollTo(0,0);
  render();
}

// ─── MUSIC ────────────────────────────────────────────────────────────────────
function applyMusic(){
  const a=document.getElementById('bgMusic');if(!a)return;
  if(S.settings.music)a.play().catch(()=>{});
  else a.pause();
}

// ─── RENDER ROOT ──────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  const focusId=document.activeElement?.id||null;
  const focusSel=document.activeElement?.dataset?.focusKey||null;

  let html='';
  if(S.page==='home')html=renderHome();
  else if(S.page==='adventures')html=renderAdventures();
  else if(S.page==='characters')html=renderCharacters();
  else if(S.page==='create')html=renderCreate();
  else if(S.page==='sheet')html=renderSheet();
  else if(S.page==='levelup')html=renderLevelUp();
  else if(S.page==='settings')html=renderSettings();

  app.innerHTML=html;

  // restore focus
  if(focusId){const el=document.getElementById(focusId);if(el){el.focus();if(el.setSelectionRange&&el.value)try{el.setSelectionRange(el.value.length,el.value.length);}catch(e){}}}
  else if(focusSel){const el=document.querySelector(`[data-focus-key="${focusSel}"]`);if(el)el.focus();}

  applyMusic();
}

      <div class="char-card" onclick="nav('sheet',{charId:'${esc(c.id)}'})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-weight:bold;font-size:1.1rem;color:#73181F">${esc(c.name)}</div>
            <div style="font-size:.76rem;opacity:.6;margin-top:2px">${[c.heritage,c.childhood,c.profession].filter(Boolean).map(esc).join(' · ')}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
            <span class="badge" style="padding:4px 10px;font-size:.75rem">Lv. ${c.level}</span>
            <span class="badge" style="background:${c.sex==='Femmina'?'#9A2727':'#5a1010'};font-size:.68rem">${esc(c.sex||'—')}</span>
          </div>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          ${[['⚔','VIG',c.vig],['👁','IST',c.ins],['🧠','MEN',c.min]].map(([ic,lb,v])=>`
          <div style="display:flex;align-items:center;gap:4px;background:rgba(115,24,31,.08);border-radius:6px;padding:3px 8px;font-size:.83rem">
            <span>${ic}</span><span style="font-weight:bold;color:#73181F">${lb}</span><span style="font-weight:bold">${v}</span>
          </div>`).join('')}
          <div style="margin-left:auto;font-size:.76rem;opacity:.65;display:flex;gap:8px">
            <span>❤ ${c.hpCurr}/${c.hpMax}</span><span>⚡ ${c.enCurr}/${c.enMax}</span>
          </div>
        </div>
      </div>`).join('');
  return`
  <div class="frame" style="width:min(640px,95vw);text-align:left;padding:24px 32px">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:22px;padding-bottom:16px;border-bottom:2px solid #73181F">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#73181F" stroke-width="2" style="flex-shrink:0"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <div>
        <h2 style="font-size:1.5rem;letter-spacing:4px;margin:0">PERSONAGGI</h2>
        <div style="font-size:.78rem;opacity:.55;margin-top:2px">${S.chars.length} ${S.chars.length===1?'eroe':'eroi'} creati</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:0;margin-bottom:16px">${charCards}</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-secondary" style="border:2px dashed #73181F;opacity:.85" onclick="nav('create')">+ Nuovo personaggio</button>
      <button class="btn btn-secondary" onclick="nav('home')">❮ TORNA AL MENU</button>
    </div>
  </div>`;
}

// ─── RENDER: CREATE CHARACTER ─────────────────────────────────────────────────
function ccStats(){return calcStats(S.cc.cs.origins);}
function ccSpent(){return S.cc.cs.equipment.reduce((s,e)=>s+e.equip_cost*(e.qty||1),0);}
function ccSlots(){return S.cc.cs.equipment.reduce((s,e)=>s+parseSlotCost(e.equip_inventory)*(e.qty||1),0);}

function renderCreate(){
  const cc=S.cc,cs=cc.cs;
  const stats=ccStats();
  const spent=ccSpent();
  const remaining=cs.credits-spent;
  const slotsUsed=ccSlots();
  const slotsMax=stats.vig*2;

  // Guide modal
  const guideKey=Object.keys(GUIDE).map(Number).sort((a,b)=>b-a).find(k=>k<=cc.step);
  const gi=GUIDE[guideKey];
  const guideModal=cc.guide&&gi?`
  <div class="overlay" style="z-index:9999">
    <div class="modal">
      <h4 style="color:#73181F;margin-bottom:10px;border-bottom:1px solid #73181F;padding-bottom:8px">${esc(gi.title)}</h4>
      <p style="white-space:pre-line;line-height:1.65;font-size:.94rem">${esc(gi.text)}</p>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn btn-secondary" style="flex:1" onclick="ccDismissGuide()">Salta guida</button>
        <button class="btn btn-primary" style="flex:1" onclick="ccCloseGuide()">Ho capito</button>
      </div>
    </div>
  </div>`:'';

  // Sidebar
  const sidebar=`
  <div style="width:230px;flex-shrink:0;background:#D8C7A1;border:2px solid #73181F;border-radius:8px;padding:16px;position:sticky;top:20px;font-size:.88rem;color:#1a1007">
    <h3 style="margin:0 0 6px;border-bottom:1px solid #73181F;padding-bottom:6px;color:#73181F;font-size:1rem">${esc(cs.name||'Eroe Ignoto')}</h3>
    ${cs.sex?`<p style="font-style:italic;opacity:.65;margin-bottom:10px;font-size:.82rem">${esc(cs.sex)}</p>`:''}
    ${[['VIG',stats.vig],['IST',stats.ins],['MEN',stats.min]].map(([k,v])=>`
    <div style="display:flex;justify-content:space-between;font-weight:bold;margin-bottom:4px"><span>${k}:</span><span>${v}</span></div>`).join('')}
    <hr style="margin:8px 0;border-color:rgba(115,24,31,.2)">
    <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span>Salute Max:</span><strong>${stats.vig*2}</strong></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span>Energia Max:</span><strong>${stats.min*2}</strong></div>
    <hr style="margin:8px 0;border-color:rgba(115,24,31,.2)">
    <div style="display:flex;justify-content:space-between;margin-bottom:3px;color:#18732D;font-weight:bold"><span>Crediti:</span><span>${remaining}</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span>Talenti:</span><strong>${cs.talents.length}/3</strong></div>
    <div style="display:flex;justify-content:space-between;color:${slotsUsed>slotsMax?'#d32f2f':'inherit'}">
      <span>Slot zaino:</span><strong>${fmtSlots(slotsUsed)}/${slotsMax}</strong>
    </div>
  </div>`;

  // Step content
  const stepContent=renderCCStep(cc,cs,stats,remaining);

  return`
  ${guideModal}
  <div style="width:min(1060px,97vw);z-index:1;display:flex;gap:18px;align-items:flex-start;padding:16px 8px;font-family:'Times New Roman',Georgia,serif;color:#1a1007">
    ${sidebar}
    <div style="flex:1;background:#D8C7A1;border:2px solid #73181F;border-radius:8px;padding:20px 24px;box-shadow:0 6px 20px rgba(0,0,0,.1)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <span style="font-size:.78rem;color:#73181F;opacity:.7">Passo ${cc.step} di 10</span>
        <div style="display:flex;gap:10px">
          <button onclick="ccOpenGuide()" style="width:28px;height:28px;border-radius:50%;background:#73181F;color:white;border:none;cursor:pointer;font-family:serif;font-weight:bold;font-size:.9rem">i</button>
          <button onclick="nav('characters')" style="background:#73181F;color:white;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-weight:bold;font-size:1.1rem;display:flex;align-items:center;justify-content:center">×</button>
        </div>
      </div>
      ${stepContent}
    </div>
  </div>`;
}

function renderCCStep(cc,cs,stats,remaining){
  const s=cc.step;
  if(s===1)return renderCCStep1(cs);
  if(s===2)return renderCCOrigins('Origini (1/3). Lignaggio','Le tue origini plasmano il tuo corpo e la tua mente.',DB.heritage,'lineage',cs.origins.lineage);
  if(s===3)return renderCCOrigins('Origini (2/3). Infanzia','Come sei cresciuto prima di prendere in mano il tuo destino?',DB.childhood,'childhood',cs.origins.childhood);
  if(s===4)return renderCCOrigins('Origini (3/3). Professione','Cosa facevi prima di diventare un avventuriero?',DB.profession,'profession',cs.origins.profession,'CREDITI ❯');
  if(s===5)return renderCCCredits(cs);
  if(s===6)return renderCCEquip('Equipaggiamento (1/3). Armi',DB.equip_weapons,remaining,5,7);
  if(s===7)return renderCCEquip('Equipaggiamento (2/3). Protezioni',DB.equip_protection,remaining,6,8);
  if(s===8)return renderCCEquip('Equipaggiamento (3/3). Dotazione',DB.equip_slots,remaining,7,9,'TALENTI ❯');
  if(s===9)return renderCCTalents(cc,cs,stats);
  if(s===10)return renderCCAbilities(cc,cs);
  return '';
}

function renderCCStep1(cs){
  return`
  <h3 style="color:#73181F;margin-bottom:14px">Il tuo Eroe</h3>
  <input id="cc-name" class="input-line" value="${esc(cs.name)}" placeholder="Nome del Personaggio" oninput="ccSetName(this.value)">
  <select class="input-line" style="cursor:pointer" onchange="ccSetSex(this.value)">
    <option value="" ${!cs.sex?'selected':''}>Scegli il Sesso...</option>
    <option value="Maschio" ${cs.sex==='Maschio'?'selected':''}>Maschio</option>
    <option value="Femmina" ${cs.sex==='Femmina'?'selected':''}>Femmina</option>
    <option value="Altro" ${cs.sex==='Altro'?'selected':''}>Altro / Non specificato</option>
  </select>
  <div style="display:flex;justify-content:flex-end;margin-top:20px;border-top:1px solid #84785E;padding-top:14px">
    <button class="btn btn-primary" style="max-width:220px" onclick="if(!S.cc.cs.name.trim()){alert('Inserisci il nome del personaggio!');return;}if(!S.cc.cs.sex){alert('Scegli il sesso!');return;}ccGoStep(2)">ORIGINI ❯</button>
  </div>`;
}

function renderCCOrigins(title,subtitle,items,type,selected,nextLabel='AVANTI ❯'){
  const prev=({lineage:1,childhood:2,profession:3}[type]);
  const next=({lineage:3,childhood:4,profession:5}[type]);
  const validation=({lineage:"Scegli un Lignaggio!",childhood:"Scegli un'Infanzia!",profession:"Scegli una Professione!"}[type]);
  return`
  <h3 style="color:#73181F;margin-bottom:6px">${esc(title)}</h3>
  <p style="font-size:.86rem;opacity:.75;margin-bottom:12px">${esc(subtitle)}</p>
  ${items.map((item,i)=>`
  <div class="cc-card ${selected?.name===item.name?'sel':''}" onclick="ccSelectOrigin('${type}',${i})">
    <div style="font-weight:bold;color:#73181F">${esc(item.name)}</div>
    <div style="font-size:.83rem;margin-top:3px;opacity:.8">${esc(item.description)}</div>
    <div style="font-size:.79rem;margin-top:5px;background:rgba(115,24,31,.07);padding:2px 7px;border-radius:4px;display:inline-block">
      VIG${item.vig>=0?'+':''}${item.vig} IST${item.ins>=0?'+':''}${item.ins} MEN${item.min>=0?'+':''}${item.min}
    </div>
  </div>`).join('')}
  <div style="display:flex;justify-content:space-between;margin-top:20px;border-top:1px solid #84785E;padding-top:14px;gap:10px">
    <button class="btn btn-secondary" style="max-width:160px" onclick="ccGoStep(${prev})">❮ INDIETRO</button>
    <button class="btn btn-primary" style="max-width:220px" onclick="if(!S.cc.cs.origins.${type}){alert('${validation.replace(/'/g,"\\'")}');return;}ccGoStep(${next})">${esc(nextLabel)}</button>
  </div>`;
}

function renderCCCredits(cs){
  return`
  <h3 style="color:#73181F;margin-bottom:14px">Crediti Iniziali</h3>
  <div style="text-align:center;padding:28px 16px;border:2px dashed #73181F;border-radius:12px;background:rgba(115,24,31,.04)">
    ${!cs.hasRolled
      ?`<p style="margin-bottom:18px;opacity:.8">Tira 4d6 per determinare i tuoi crediti iniziali (risultato × 10).</p>
         <button class="btn btn-primary" style="max-width:220px;margin:0 auto" onclick="ccRollCredits()">🎲 LANCIA I DADI</button>`
      :`<p style="margin-bottom:8px;opacity:.8">Il destino ha parlato!</p>
        <div style="font-size:4rem;color:#73181F;font-weight:bold;margin:10px 0">${cs.credits}</div>
        <p>Hai ottenuto <strong>${cs.credits}</strong> Crediti.</p>`}
  </div>
  <div style="display:flex;justify-content:space-between;margin-top:20px;border-top:1px solid #84785E;padding-top:14px;gap:10px">
    <button class="btn btn-secondary" style="max-width:160px" onclick="ccGoStep(4)">❮ INDIETRO</button>
    <button class="btn btn-primary" style="max-width:220px" onclick="if(!S.cc.cs.hasRolled){alert('Tira i dadi prima!');return;}ccGoStep(6)">EQUIPAGGIAMENTO ❯</button>
  </div>`;
}

function renderCCEquip(title,items,remaining,prev,next,nextLabel='AVANTI ❯'){
  const spent=ccSpent();
  return`
  <h3 style="color:#73181F;margin-bottom:6px">${esc(title)}</h3>
  <div style="margin-bottom:12px;font-weight:bold;color:#18732D;font-size:.9rem">Crediti rimanenti: ${remaining}</div>
  ${items.map((item,i)=>{
    const entry=S.cc.cs.equipment.find(e=>e.equip_name===item.equip_name);
    const qty=entry?entry.qty||1:0;
    const canMore=(spent+item.equip_cost)<=S.cc.cs.credits;
    const slotLabel=item.equip_inventory&&String(item.equip_inventory)!=='0'?String(item.equip_inventory):'0 slot';
    const sc=parseSlotCost(item.equip_inventory);
    return`
    <div class="equip-card ${qty>0?'sel':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px">
        <span style="font-weight:bold;color:#73181F">${esc(item.equip_name)}</span>
        <div style="display:flex;gap:5px;flex-shrink:0">
          <span class="badge" style="background:#555;font-size:.64rem">📦 ${esc(slotLabel)}</span>
          <span class="badge">${item.equip_cost} cr</span>
        </div>
      </div>
      <div style="font-size:.81rem;opacity:.8;margin-bottom:8px">${esc(item.equip_bonus)}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <button class="sm-btn" ${qty===0?'disabled':''} onclick="ccRemoveEquip('${esc(item.equip_name)}')">−</button>
        <span style="font-weight:bold;min-width:22px;text-align:center;color:${qty>0?'#73181F':'#888'}">${qty}</span>
        <button class="sm-btn" ${!canMore?'disabled':''} onclick="ccAddEquip('${esc(item.equip_name)}',${i})">+</button>
        ${qty>0&&sc>0?`<span style="font-size:.72rem;opacity:.65;margin-left:4px">(${fmtSlots(sc*qty)} slot totali)</span>`:''}
      </div>
    </div>`}).join('')}
  <div style="display:flex;justify-content:space-between;margin-top:20px;border-top:1px solid #84785E;padding-top:14px;gap:10px">
    <button class="btn btn-secondary" style="max-width:160px" onclick="ccGoStep(${prev})">❮ INDIETRO</button>
    <button class="btn btn-primary" style="max-width:220px" onclick="ccGoStep(${next})">${esc(nextLabel)}</button>
  </div>`;
}

function renderCCTalents(cc,cs,stats){
  return`
  <h3 style="color:#73181F;margin-bottom:6px">Talenti (Max 3)</h3>
  <p style="font-size:.84rem;opacity:.75;margin-bottom:10px">Scelti: ${cs.talents.length}/3 — clicca per selezionare/deselezionare.</p>
  ${['VIG','IST','MEN'].map(cat=>{
    const catStat={VIG:stats.vig,IST:stats.ins,MEN:stats.min}[cat];
    const statOk=catStat>=6;
    const isOpen=cc.openCats[cat];
    const talentsOfCat=DB.talents.filter(t=>t.cat===cat);
    return`
    <div>
      <div class="sec-hdr">
        <span>${cat}</span>
        ${!statOk?`<button onclick="ccToggleCat('${cat}')" style="background:none;border:1px solid #73181F;border-radius:4px;padding:1px 8px;font-size:.72rem;cursor:pointer;color:#73181F;font-weight:bold">${isOpen?'▾ chiudi':'▸ mostra'}</button>`:''}
      </div>
      ${!statOk&&!isOpen?`<div style="font-size:.82rem;color:#888;font-style:italic;padding:5px 0 8px">⚠ Richiede ${cat} ≥ 6 per accedere a questi talenti (il tuo è ${catStat}).</div>`:''}
      ${(statOk||isOpen)?talentsOfCat.map((t,idx)=>{
        const dbIdx=DB.talents.indexOf(t);
        const count=cs.talents.filter(x=>x.talent_name===t.talent_name).length;
        const max=t.talent_max||1;
        const sel=count>0;
        const reqErr=!statOk?`Richiede ${cat} ≥ 6`:checkTalentReqs(t,stats,1,cs.talents);
        const reqMet=!reqErr;
        const atMax=count>=max;
        const clickable=!(!statOk)&&reqMet&&!(atMax&&!sel);
        const r=t.talent_req||{};
        const rp=[];
        if(r.level)rp.push(`Lv.${r.level}`);
        if(r.vig)rp.push(`${r.vig} VIG`);
        if(r.ist)rp.push(`${r.ist} IST`);
        if(r.men)rp.push(`${r.men} MEN`);
        if(r.talent)rp.push(r.talent);
        const catC={VIG:'#8B0000',IST:'#1a4a1a',MEN:'#1a1a6e'}[cat];
        return`
        <div class="cc-card ${sel?'sel':''} ${!clickable?'dis':''}" onclick="${clickable?`ccToggleTalent(${dbIdx})`:'void(0)'}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-weight:bold;color:#73181F">${esc(t.talent_name)}</span>
              <span class="badge" style="background:${catC};font-size:.65rem">${cat}</span>
              ${max>1&&max<99?`<span class="badge" style="background:#555;font-size:.65rem">max ${max}</span>`:''}
              ${max===99?`<span class="badge" style="background:#555;font-size:.65rem">ripetibile</span>`:''}
            </div>
            <span class="badge" style="flex-shrink:0">${esc(t.talent_cost)}</span>
          </div>
          ${rp.length?`<div style="font-size:.73rem;margin-top:4px;color:${reqMet?'#18732D':'#d32f2f'};font-weight:bold">${reqMet?'✓':'✗'} Req: ${esc(rp.join(' · '))}</div>`:''}
          <div style="font-size:.81rem;margin-top:4px;opacity:.8">${esc(t.talent_description)}</div>
          ${sel?`<div style="font-size:.72rem;margin-top:4px;color:#73181F;font-weight:bold">✓ Selezionato${count>1?` ×${count}`:''}</div>`:''}
          ${!reqMet?`<div style="font-size:.72rem;margin-top:3px;color:#d32f2f">${esc(reqErr)}</div>`:''}
        </div>`}).join(''):''}
    </div>`}).join('')}
  <div style="display:flex;justify-content:space-between;margin-top:20px;border-top:1px solid #84785E;padding-top:14px;gap:10px">
    <button class="btn btn-secondary" style="max-width:160px" onclick="ccGoStep(8)">❮ INDIETRO</button>
    <button class="btn btn-primary" style="max-width:220px" onclick="ccGoStep(10)">ABILITÀ ❯</button>
  </div>`;
}

function renderCCAbilities(cc,cs){
  const psycheCount=cs.talents.filter(t=>t.talent_name.toLowerCase().includes('psiche')).length;
  const hasPsyche=psycheCount>0;
  const maxAb=psycheCount*3;
  let abContent='';
  if(!hasPsyche){
    abContent=`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(115,24,31,.06);border-radius:8px;margin-bottom:8px;border:1px dashed #73181F">
      <div style="font-size:.86rem;color:#73181F">🔒 Richiede il talento <strong>Abile nella psiche</strong> per sbloccare le abilità.</div>
      <button onclick="ccToggleAbilityOpen()" style="background:none;border:1px solid #73181F;border-radius:4px;padding:2px 8px;font-size:.73rem;cursor:pointer;color:#73181F;font-weight:bold;flex-shrink:0;margin-left:10px">${cc.abilityOpen?'▾ chiudi':'▸ mostra'}</button>
    </div>
    ${cc.abilityOpen?DB.abilities.map(a=>`
    <div class="cc-card dis" style="opacity:.4;cursor:not-allowed">
      <div style="display:flex;justify-content:space-between">
        <span style="font-weight:bold;color:#73181F">${esc(a.ability_name)}</span>
        <span class="badge">${esc(a.ability_cost)}</span>
      </div>
      <div style="font-size:.81rem;margin-top:3px;opacity:.8">${esc(a.ability_description)}</div>
    </div>`).join(''):''}`;
  } else {
    abContent=`
    <p style="font-size:.84rem;opacity:.75;margin-bottom:10px">Abile nella psiche ×${psycheCount} — puoi scegliere fino a <strong>${maxAb}</strong> abilità. Selezionate: ${cs.abilities.length}/${maxAb}</p>
    ${DB.abilities.map((a,i)=>{
      const sel=cs.abilities.some(x=>x.ability_name===a.ability_name);
      const maxReached=cs.abilities.length>=maxAb&&!sel;
      return`
      <div class="cc-card ${sel?'sel':''} ${maxReached?'dis':''}" onclick="${maxReached?'void(0)':`ccToggleAbility(${i})`}">
        <div style="display:flex;justify-content:space-between">
          <span style="font-weight:bold;color:#73181F">${esc(a.ability_name)}</span>
          <span class="badge">${esc(a.ability_cost)}</span>
        </div>
        <div style="font-size:.81rem;margin-top:3px;opacity:.8">${esc(a.ability_description)}</div>
        ${sel?`<div style="font-size:.72rem;margin-top:3px;color:#73181F;font-weight:bold">✓ Selezionata</div>`:''}
      </div>`}).join('')}`;
  }
  return`
  <h3 style="color:#73181F;margin-bottom:6px">Abilità Speciali Psichiche</h3>
  ${abContent}
  <div style="display:flex;justify-content:space-between;margin-top:20px;border-top:1px solid #84785E;padding-top:14px;gap:10px">
    <button class="btn btn-secondary" style="max-width:160px" onclick="ccGoStep(9)">❮ INDIETRO</button>
    <button class="btn btn-primary" style="max-width:220px" onclick="ccFinish()">CONCLUDI ✓</button>
  </div>`;
}

function navBtns(onBack,onNext,nextLabel='AVANTI ❯'){
  return`<div style="display:flex;justify-content:${onBack?'space-between':'flex-end'};margin-top:20px;border-top:1px solid #84785E;padding-top:14px;gap:10px">
    ${onBack?`<button class="btn btn-secondary" style="max-width:160px" onclick="${onBack}()">❮ INDIETRO</button>`:''}
    <button class="btn btn-primary" style="max-width:220px" onclick="${onNext}()">${esc(nextLabel)}</button>

// ─── CC EVENT HANDLERS ────────────────────────────────────────────────────────
function ccSetName(v){S.cc.cs.name=v;render();}
function ccSetSex(v){S.cc.cs.sex=v;render();}
function ccOpenGuide(){S.cc.guide=true;render();}
function ccCloseGuide(){S.cc.guide=false;render();}
function ccDismissGuide(){S.cc.guide=false;S.cc.guideDismissed=true;render();}
function ccGoStep(n){
  S.cc.step=n;
  if(!S.cc.guideDismissed&&GUIDE[n])S.cc.guide=true;
  window.scrollTo(0,0);render();
}
function ccSelectOrigin(type,i){
  S.cc.cs.origins[type]={lineage:DB.heritage,childhood:DB.childhood,profession:DB.profession}[type][i];
  render();
}
function ccRollCredits(){
  openDiceOv(4,'CREDITI INIZIALI','Lancia 4d6 × 10 per i tuoi Crediti di partenza','credits',null,(vals,total)=>{
    S.cc.cs.credits=total*10;S.cc.cs.hasRolled=true;render();
  });
}
function ccAddEquip(name,dbIdx){
  // find item in all equip arrays
  const allEquip=[...DB.equip_weapons,...DB.equip_protection,...DB.equip_slots];
  const item=allEquip.find(e=>e.equip_name===name);
  if(!item)return;
  const spent=ccSpent();
  if(spent+item.equip_cost>S.cc.cs.credits){alert('Crediti insufficienti!');return;}
  const idx=S.cc.cs.equipment.findIndex(e=>e.equip_name===name);
  if(idx>=0){S.cc.cs.equipment[idx].qty=(S.cc.cs.equipment[idx].qty||1)+1;}
  else{S.cc.cs.equipment.push({...item,qty:1});}
  render();
}
function ccRemoveEquip(name){
  const idx=S.cc.cs.equipment.findIndex(e=>e.equip_name===name);
  if(idx<0)return;
  const qty=S.cc.cs.equipment[idx].qty||1;
  if(qty<=1)S.cc.cs.equipment.splice(idx,1);
  else S.cc.cs.equipment[idx].qty=qty-1;
  render();
}
function ccToggleCat(cat){S.cc.openCats[cat]=!S.cc.openCats[cat];render();}
function ccToggleAbilityOpen(){S.cc.abilityOpen=!S.cc.abilityOpen;render();}
function ccToggleTalent(dbIdx){
  const t=DB.talents[dbIdx];
  const cs=S.cc.cs;
  const stats=ccStats();
  const count=cs.talents.filter(x=>x.talent_name===t.talent_name).length;
  const max=t.talent_max||1;
  if(count>0){
    const arr=cs.talents;
    for(let i=arr.length-1;i>=0;i--){if(arr[i].talent_name===t.talent_name){arr.splice(i,1);break;}}
  } else {
    if(cs.talents.length>=3){alert('Puoi scegliere al massimo 3 talenti!');return;}
    if(count>=max){alert(`Questo talento può essere preso al massimo ${max} volta/e!`);return;}
    const err=checkTalentReqs(t,stats,1,cs.talents);
    if(err){alert(err);return;}
    cs.talents.push(t);
    // if ability count now exceeds allowed (psiche removed), trim
    const psycheCount=cs.talents.filter(x=>x.talent_name.toLowerCase().includes('psiche')).length;
    const maxAb=psycheCount*3;
    if(cs.abilities.length>maxAb)cs.abilities=cs.abilities.slice(0,maxAb);
  }
  render();
}
function ccToggleAbility(i){
  const a=DB.abilities[i];
  const cs=S.cc.cs;
  const psycheCount=cs.talents.filter(t=>t.talent_name.toLowerCase().includes('psiche')).length;
  if(!psycheCount){alert("Richiede il talento 'Abile nella Psiche'!");return;}
  const maxAb=psycheCount*3;
  const has=cs.abilities.some(x=>x.ability_name===a.ability_name);
  if(has){cs.abilities=cs.abilities.filter(x=>x.ability_name!==a.ability_name);}
  else{if(cs.abilities.length>=maxAb){alert(`Massimo ${maxAb} abilità!`);return;}cs.abilities.push(a);}
  render();
}
function ccFinish(){
  const cs=S.cc.cs;
  if(!cs.name.trim()){alert('Inserisci il nome del personaggio!');return;}
  if(!cs.origins.lineage||!cs.origins.childhood||!cs.origins.profession){alert('Completa tutte le Origini!');return;}
  const st=ccStats();
  const spent=ccSpent();
  const char={
    id:cs.id,name:cs.name,sex:cs.sex,level:1,exp:0,
    vig:st.vig,ins:st.ins,min:st.min,
    cVig:0,cIns:0,cMin:0,
    hpMax:st.vig*2,hpCurr:st.vig*2,
    enMax:st.min*2,enCurr:st.min*2,
    damage:1,protection:0,
    heritage:cs.origins.lineage.name,childhood:cs.origins.childhood.name,profession:cs.origins.profession.name,
    credits:cs.credits-spent,
    inventory:cs.equipment.map(e=>({item:e.equip_name,description:e.equip_bonus,quantity:e.qty||1,slot:String(e.equip_inventory||'0')})),
    talents:cs.talents,abilities:cs.abilities,
    mainHand:'',offHand:'',body:'',slot1:'',slot2:'',slot3:'',
  };
  S.chars.push(char);persist();
  nav('characters');
}

  // Delete modal
  const delModal=S.sh.deleteModal?`

      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary" style="flex:1" onclick="shCancelDelete()">Annulla</button>

    </div>
  </div>`:'';

  let tabContent='';

  else if(S.sh.tab==='inventario')tabContent=renderSheetInventario(L);
  else if(S.sh.tab==='talenti')tabContent=renderSheetTalenti(L);

      <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
        <div style="font-size:1.8rem;font-weight:bold;color:#73181F;flex:1">${esc(L.name)}</div>
        <div style="display:flex;gap:10px;align-items:center">
          <div style="display:flex;flex-direction:column;align-items:center;font-size:.74rem;color:#73181F;font-weight:bold">LIV<span style="font-size:1.05rem">${L.level}</span></div>
          <div style="display:flex;flex-direction:column;align-items:center;font-size:.74rem;color:#73181F;font-weight:bold">
            EXP<input id="sh-exp" type="number" value="${L.exp||0}" style="width:54px;text-align:center;border:none;background:transparent;font-size:1.05rem;font-family:inherit;outline:none;color:#1a1007" oninput="shSetExp(this.value)">
          </div>
          ${L.level<10?`<button title="Passa di livello" onclick="nav('levelup',{charId:'${esc(L.id)}'})" style="background:#73181F;color:white;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-weight:bold;font-size:1.1rem;display:flex;align-items:center;justify-content:center">+</button>`:''}
          <button onclick="shOpenDelete()" style="background:transparent;color:#d32f2f;border:1.5px solid #d32f2f;border-radius:6px;padding:4px 9px;cursor:pointer;font-size:.75rem;font-weight:bold;letter-spacing:.5px;font-family:inherit">✕ Elimina</button>
        </div>
      </div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:.85rem;opacity:.75">

}

          <button onclick="shOpenDice('${l}',${eff(k)})" title="Tiro su ${l}" style="margin-left:auto;background:#73181F;color:white;border:none;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:.8rem;flex-shrink:0">🎲</button>
        </div>`).join('')}
      </div>
      <div>
        <h3 style="color:#73181F;letter-spacing:2px;font-size:.88rem;margin-bottom:10px">COMBATTIMENTO</h3>

        <div style="display:flex;gap:8px;margin-bottom:14px">
          <button onclick="shAdjust('enCurr',-1)" style="background:#73181F;color:white;border:none;border-radius:6px;padding:4px 12px;cursor:pointer;font-family:inherit;font-weight:bold">−</button>

// ─── SHEET EVENT HANDLERS ─────────────────────────────────────────────────────
function shSetTab(t){S.sh.tab=t;render();}
function shSetExp(v){S.sh.local.exp=parseInt(v)||0;} // no re-render to keep focus
function shAdjust(field,delta){
  const L=S.sh.local;
  if(field==='hpCurr')L.hpCurr=Math.max(0,Math.min(L.hpMax,L.hpCurr+delta));
  if(field==='enCurr')L.enCurr=Math.max(0,Math.min(L.enMax,L.enCurr+delta));
  render();
}
function shToggleCond(k,g){
  const L=S.sh.local;
  const ck=`c${k[0].toUpperCase()+k.slice(1)}`;
  const cur=L[ck]||0;
  L[ck]=cur>=g?g-1:g;
  render();
}
function shSetEquip(slot,val){S.sh.local[slot]=val;render();}
function shOpenDice(name,val){
  openDiceOv(2,'TIRO CARATTERISTICA',`${name} ${val} — successo con 2d6 ≤ ${val}`,'stat',val,()=>{render();});
}
function shUseItem(idx){
  const inv=S.sh.local.inventory;
  if(inv[idx].quantity>1)inv[idx]={...inv[idx],quantity:inv[idx].quantity-1};
  else inv.splice(idx,1);
  render();
}
function shOpenDelete(){S.sh.deleteModal=true;S.sh.deleteInput='';render();}
function shCancelDelete(){S.sh.deleteModal=false;S.sh.deleteInput='';render();}
function shSetDeleteInput(v){S.sh.deleteInput=v;}
function shConfirmDelete(){
  if(S.sh.deleteInput.trim()===S.sh.local.name.trim()){
    const id=S.sh.local.id;
    S.chars=S.chars.filter(c=>c.id!==id);
    persist();nav('characters');
  } else {alert('Il nome non corrisponde. Eliminazione annullata.');}
}
function shSave(){
  // read exp from input in case it wasn't rerendered
  const expEl=document.getElementById('sh-exp');
  if(expEl)S.sh.local.exp=parseInt(expEl.value)||0;
  const idx=S.chars.findIndex(c=>c.id===S.sh.local.id);
  if(idx>=0)S.chars[idx]=JSON.parse(JSON.stringify(S.sh.local));
  persist();alert('Scheda salvata!');
}

// ─── LU EVENT HANDLERS ────────────────────────────────────────────────────────
function luGoStep(n){S.lu.step=n;window.scrollTo(0,0);render();}
function luSelectAttr(k){S.lu.attrBoost=k;render();}
function luSelectTalent(dbIdx){S.lu.newTalent=DB.talents[dbIdx];render();}
function luToggleCat(cat){S.lu.openCats[cat]=!S.lu.openCats[cat];render();}
function luSelectAbility(dbIdx){
  const a=DB.abilities[dbIdx];
  const lu=S.lu;
  const isBase=lu.newAbility?.ability_name===a.ability_name;
  const isExtra=lu.extraAbilities.some(x=>x.ability_name===a.ability_name);
  const isPsyche=lu.newTalent?.talent_name?.toLowerCase().includes('psiche');
  if(isBase){lu.newAbility=null;render();return;}
  if(isExtra){lu.extraAbilities=lu.extraAbilities.filter(x=>x.ability_name!==a.ability_name);render();return;}
  if(!lu.newAbility){lu.newAbility=a;render();return;}
  if(isPsyche&&lu.extraAbilities.length<3){lu.extraAbilities.push(a);render();return;}
}
function luFinish(){
  const char=S.chars.find(c=>c.id===S.params.charId);
  if(!char)return;
  const lu=S.lu;
  const newLvl=char.level+1;
  const s={...char,level:newLvl,exp:0,hpMax:char.hpMax+2,hpCurr:char.hpCurr+2,enMax:char.enMax+2,enCurr:char.enCurr+2};
  if(lu.attrBoost)s[lu.attrBoost]=(char[lu.attrBoost]||0)+1;
  if(lu.newTalent)s.talents=[...(char.talents||[]),lu.newTalent];
  const allNewAb=[lu.newAbility,...lu.extraAbilities].filter(Boolean);
  if(allNewAb.length)s.abilities=[...(char.abilities||[]),...allNewAb];
  const idx=S.chars.findIndex(c=>c.id===char.id);
  if(idx>=0)S.chars[idx]=s;
  persist();
  alert(`${char.name} è avanzato al Livello ${newLvl}!`);
  nav('sheet',{charId:char.id});
}

// ─── 3D DICE OVERLAY ──────────────────────────────────────────────────────────
let _diceThree=null;

// BoxGeometry material face order: [+X,-X,+Y,-Y,+Z,-Z] = die faces [3,4,1,6,2,5]
// Euler to land face N on top (+Y axis up):
const _FACE_EULER={
  1:[0,0,0],            // 1 already at +Y
  2:[-Math.PI/2,0,0],   // +Z → +Y
  3:[0,0,Math.PI/2],    // +X → +Y
  4:[0,0,-Math.PI/2],   // -X → +Y
  5:[Math.PI/2,0,0],    // -Z → +Y
  6:[Math.PI,0,0],      // -Y → +Y
};
const _FACE_Q={};
function _buildFaceQ(){
  if(_FACE_Q[1])return;
  for(let v=1;v<=6;v++){
    _FACE_Q[v]=new THREE.Quaternion().setFromEuler(new THREE.Euler(..._FACE_EULER[v]));
  }
}

function _pipPositions(v){
  const lo=0.27,hi=0.73,c=0.5;
  return{1:[[c,c]],2:[[lo,hi],[hi,lo]],3:[[lo,hi],[c,c],[hi,lo]],
    4:[[lo,lo],[hi,lo],[lo,hi],[hi,hi]],
    5:[[lo,lo],[hi,lo],[c,c],[lo,hi],[hi,hi]],
    6:[[lo,lo],[hi,lo],[lo,c],[hi,c],[lo,hi],[hi,hi]]}[v];
}

function _makeFaceTex(v){
  const sz=128;
  const cv=document.createElement('canvas');cv.width=cv.height=sz;
  const ctx=cv.getContext('2d');
  // Parchment gradient background
  const g=ctx.createLinearGradient(0,0,sz,sz);
  g.addColorStop(0,'#F8F2E2');g.addColorStop(1,'#EBD9B8');
  ctx.fillStyle=g;
  ctx.beginPath();ctx.roundRect(3,3,sz-6,sz-6,14);ctx.fill();
  // Border
  ctx.strokeStyle='#73181F';ctx.lineWidth=6;
  ctx.beginPath();ctx.roundRect(5,5,sz-10,sz-10,11);ctx.stroke();
  // Pips
  const pips=_pipPositions(v);
  pips.forEach(([px,py])=>{
    ctx.beginPath();
    ctx.arc(px*sz,py*sz,sz*0.09,0,Math.PI*2);
    ctx.fillStyle=v===1?'#73181F':'#1a1007';
    ctx.fill();
  });
  return new THREE.CanvasTexture(cv);
}

function openDiceOv(numDice,title,subtitle,mode,statValue,onClose){
  if(_diceThree)_destroyDiceThree();
  S.diceOv={numDice,mode,statValue,rolling:false,settled:false,values:null,total:null,onClose};
  const ov=document.getElementById('dice-overlay');
  ov.style.display='flex';
  document.getElementById('dice-ov-title').textContent=title;
  document.getElementById('dice-ov-sub').textContent=subtitle;
  document.getElementById('dice-ov-result').innerHTML='<p style="opacity:.5;font-style:italic;font-size:.88rem">Premi il pulsante per lanciare.</p>';
  const btn=document.getElementById('dice-ov-btn');
  btn.textContent='🎲 Lancia '+numDice+'d6';btn.disabled=false;
  requestAnimationFrame(()=>_initDice3D(numDice));
}

function closeDiceOv(){
  const diceOv=S.diceOv;
  if(diceOv&&diceOv.settled&&diceOv.onClose)diceOv.onClose(diceOv.values,diceOv.total);
  S.diceOv=null;
  _destroyDiceThree();
  const ov=document.getElementById('dice-overlay');
  if(ov)ov.style.display='none';
}

function _destroyDiceThree(){
  if(_diceThree){
    if(_diceThree.animId)cancelAnimationFrame(_diceThree.animId);
    try{if(_diceThree.renderer&&_diceThree.renderer.dispose)_diceThree.renderer.dispose();}catch(e){}
    _diceThree=null;
  }
}

function _initDice3D(numDice){
  if(typeof THREE==='undefined'){_init2DFallback(numDice);return;}
  _buildFaceQ();
  const canvas=document.getElementById('dice-canvas');
  if(!canvas)return;
  const W=Math.min(canvas.parentElement.offsetWidth-32,500)||460;
  const H=260;
  canvas.width=W;canvas.height=H;
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setSize(W,H);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x120801);
  const camera=new THREE.PerspectiveCamera(38,W/H,0.1,100);
  camera.position.set(0,10,12);camera.lookAt(0,0,0);
  // Lighting
  scene.add(new THREE.AmbientLight(0xffeedd,0.3));
  const sun=new THREE.DirectionalLight(0xfffaf0,1.5);
  sun.position.set(5,14,8);sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024);
  sun.shadow.camera.near=0.5;sun.shadow.camera.far=50;
  sun.shadow.camera.left=sun.shadow.camera.bottom=-8;
  sun.shadow.camera.right=sun.shadow.camera.top=8;
  scene.add(sun);
  const fill=new THREE.PointLight(0x73181F,0.5,20);fill.position.set(-5,3,5);scene.add(fill);
  // Table plane
  const tbl=new THREE.Mesh(new THREE.PlaneGeometry(30,30),new THREE.MeshLambertMaterial({color:0x150901}));
  tbl.rotation.x=-Math.PI/2;tbl.receiveShadow=true;scene.add(tbl);
  // Felt texture ring
  const ring=new THREE.Mesh(new THREE.RingGeometry(4,6,64),new THREE.MeshLambertMaterial({color:0x1e0d03,side:THREE.DoubleSide}));
  ring.rotation.x=-Math.PI/2;ring.position.y=0.01;scene.add(ring);
  // Die face material order for BoxGeometry: +X,-X,+Y,-Y,+Z,-Z = faces 3,4,1,6,2,5
  const FACE_ORDER=[3,4,1,6,2,5];
  const dice=[];
  const maxSpread=Math.min(2.2,7/numDice);
  for(let i=0;i<numDice;i++){
    const mats=FACE_ORDER.map(v=>new THREE.MeshStandardMaterial({map:_makeFaceTex(v),roughness:0.22,metalness:0.0}));
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(1.35,1.35,1.35),mats);
    mesh.castShadow=true;
    const xFinal=(i-(numDice-1)/2)*maxSpread*2;
    mesh.position.set(xFinal+(Math.random()-0.5)*0.5,6+i*0.8,(Math.random()-0.5)*1.2);
    mesh.rotation.set(Math.random()*Math.PI*2,Math.random()*Math.PI*2,Math.random()*Math.PI*2);
    scene.add(mesh);
    dice.push({mesh,xFinal,targetQuat:null,targetPos:null,spinVel:null,fallStart:null,phaseQuat:null});
  }
  _diceThree={scene,camera,renderer,dice,animId:null,rolling:false,W,H};
  renderer.render(scene,camera);
  // Idle gentle spin
  (function idle(){
    if(!_diceThree||_diceThree.rolling)return;
    dice.forEach(d=>{d.mesh.rotation.y+=0.004;});
    renderer.render(scene,camera);
    _diceThree.animId=requestAnimationFrame(idle);
  })();
}

function _init2DFallback(numDice){
  const canvas=document.getElementById('dice-canvas');if(!canvas)return;
  canvas.width=460;canvas.height=220;
  const ctx=canvas.getContext('2d');
  _draw2DPlaceholder(ctx,canvas.width,canvas.height,numDice,[]);
  _diceThree={scene:null,camera:null,renderer:{render:()=>{}},dice:[],animId:null,rolling:false,fallback2D:true,ctx,W:460,H:220,numDice};
}

function _draw2DPlaceholder(ctx,W,H,numDice,vals){
  const F=['⚀','⚁','⚂','⚃','⚄','⚅'];
  ctx.fillStyle='#120801';ctx.fillRect(0,0,W,H);
  for(let i=0;i<numDice;i++){
    const x=(i+0.5)*(W/numDice);
    const face=vals[i]?F[vals[i]-1]:'?';
    const sz=Math.min(W/numDice*0.55,H*0.55);
    ctx.font=`bold ${sz}px serif`;ctx.textAlign='center';
    ctx.fillStyle=vals.length?'#F5EDD8':'rgba(245,237,216,.4)';
    ctx.fillText(face,x,H*0.62);
  }
}

function startDiceRoll(){
  if(!_diceThree||_diceThree.rolling)return;
  const diceOv=S.diceOv;if(!diceOv)return;
  _diceThree.rolling=true;
  if(_diceThree.animId)cancelAnimationFrame(_diceThree.animId);
  // Pre-determine values
  const numDice=diceOv.numDice;
  const values=Array.from({length:numDice},()=>Math.ceil(Math.random()*6));
  diceOv.values=values;
  diceOv.total=values.reduce((s,v)=>s+v,0);
  const btn=document.getElementById('dice-ov-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳ ...';}
  document.getElementById('dice-ov-result').innerHTML='';
  if(_diceThree.fallback2D){_start2DRoll(values,diceOv);return;}
  // Setup target for each die
  const {dice}=_diceThree;
  dice.forEach((d,i)=>{
    const val=values[i];
    // Final quaternion = Y-random spin then face alignment
    const qBase=_FACE_Q[val].clone();
    const qY=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),Math.random()*Math.PI*2);
    d.targetQuat=new THREE.Quaternion().multiplyQuaternions(qY,qBase);
    d.targetPos=new THREE.Vector3(d.xFinal+(Math.random()-0.5)*0.3,0.68,(Math.random()-0.5)*0.9);
    d.spinVel=new THREE.Vector3((Math.random()-0.5)*28,(Math.random()-0.5)*28,(Math.random()-0.5)*28);
    d.fallStart=d.mesh.position.clone();
    d.phaseQuat=null;
  });
  const FALL=1500,SETTLE=1000,TOTAL=FALL+SETTLE,t0=performance.now();
  function frame(now){
    const el=Math.min(now-t0,TOTAL);
    dice.forEach(d=>{
      if(el<=FALL){
        const tp=el/FALL;
        // Fall with arc and slight bounce near landing
        const fe=tp<0.82?tp/0.82:1-Math.sin((tp-0.82)/0.18*Math.PI)*0.10;
        d.mesh.position.lerpVectors(d.fallStart,d.targetPos,fe);
        d.mesh.position.y=d.fallStart.y*(1-fe)+d.targetPos.y*fe+Math.sin(tp*Math.PI)*1.2*(1-tp*0.4);
        const sd=Math.pow(1-tp,1.2);
        const st=el*0.001;
        d.mesh.rotation.set(d.spinVel.x*st*sd,d.spinVel.y*st*sd,d.spinVel.z*st*sd);
        d.phaseQuat=null;
      }else{
        const sp=(el-FALL)/SETTLE;
        const ease=1-Math.pow(1-sp,3);
        d.mesh.position.copy(d.targetPos);
        if(!d.phaseQuat)d.phaseQuat=d.mesh.quaternion.clone();
        d.mesh.quaternion.slerpQuaternions(d.phaseQuat,d.targetQuat,ease);
      }
    });
    _diceThree.renderer.render(_diceThree.scene,_diceThree.camera);
    if(el<TOTAL){_diceThree.animId=requestAnimationFrame(frame);}
    else{
      dice.forEach(d=>{d.mesh.position.copy(d.targetPos);d.mesh.quaternion.copy(d.targetQuat);});
      _diceThree.renderer.render(_diceThree.scene,_diceThree.camera);
      _diceThree.rolling=false;
      diceOv.settled=true;
      _showDiceOvResult(diceOv);
      // Gentle idle rock after settling
      const t1=performance.now();
      (function rock(now){
        if(!_diceThree||_diceThree.rolling)return;
        const rt=(now-t1)*0.001;
        dice.forEach((d,i)=>{
          const ph=i*1.1;
          const rq=new THREE.Quaternion().setFromEuler(new THREE.Euler(
            Math.sin(rt*0.7+ph)*0.012,0,Math.sin(rt*0.5+ph*1.4)*0.012
          ));
          d.mesh.quaternion.multiplyQuaternions(d.targetQuat,rq);
        });
        _diceThree.renderer.render(_diceThree.scene,_diceThree.camera);
        _diceThree.animId=requestAnimationFrame(rock);
      })(performance.now());
    }
  }
  _diceThree.animId=requestAnimationFrame(frame);
}

function _start2DRoll(values,diceOv){
  const {ctx,W,H,numDice}=_diceThree;
  const F=['⚀','⚁','⚂','⚃','⚄','⚅'];
  let tick=0,MAX=22;
  const iv=setInterval(()=>{
    ctx.fillStyle='#120801';ctx.fillRect(0,0,W,H);
    const sz=Math.min(W/numDice*0.55,H*0.55);
    ctx.font=`bold ${sz}px serif`;ctx.textAlign='center';
    for(let i=0;i<numDice;i++){
      const x=(i+0.5)*(W/numDice);
      ctx.fillStyle='rgba(245,237,216,.8)';
      ctx.fillText(F[Math.floor(Math.random()*6)],x,H*0.62);
    }
    tick++;
    if(tick>=MAX){
      clearInterval(iv);
      _draw2DPlaceholder(ctx,W,H,numDice,values);
      _diceThree.rolling=false;diceOv.settled=true;_showDiceOvResult(diceOv);
    }
  },70);
}

function _showDiceOvResult(diceOv){
  const{values,total,mode,statValue}=diceOv;
  const rd=document.getElementById('dice-ov-result');
  const btn=document.getElementById('dice-ov-btn');
  if(!rd||!btn)return;
  let html='';
  if(mode==='credits'){
    const cr=total*10;
    html=`<div style="opacity:.7;font-size:.83rem;margin-bottom:2px">${values.join(' + ')} = ${total} × 10</div>
    <div style="font-size:3rem;font-weight:bold;color:#73181F;line-height:1.15">${cr}</div>
    <div style="font-size:.82rem;opacity:.65">Crediti iniziali</div>`;
  }else if(mode==='stat'){
    const ok=total<=statValue;
    html=`<div style="font-size:1.1rem;font-weight:bold;color:#73181F;margin-bottom:6px">${values.join(' + ')} = <span style="font-size:1.6rem">${total}</span> vs target ${statValue}</div>
    <div style="display:inline-block;padding:7px 26px;border-radius:8px;font-weight:bold;font-size:1rem;letter-spacing:2px;background:${ok?'#18732D':'#d32f2f'};color:white;box-shadow:0 0 18px ${ok?'rgba(24,115,45,.45)':'rgba(211,47,47,.45)'}">
      ${ok?'✓ SUCCESSO':'✗ FALLIMENTO'}
    </div>`;
  }else{
    html=`<div style="font-size:2rem;font-weight:bold;color:#73181F">${values.join(' + ')} = ${total}</div>`;
  }
  rd.innerHTML=html;
  btn.textContent='🎲 Rilancia';btn.disabled=false;
}

// ─── RENDER: SETTINGS ─────────────────────────────────────────────────────────
// ─── RENDER: SETTINGS ─────────────────────────────────────────────────────────
function renderSettings(){
  const{music,diceAnim}=S.settings;
  const tog=(id,checked,fn)=>`
  <label class="toggle-wrap">
    <input type="checkbox" ${checked?'checked':''} onchange="${fn}">
    <span class="toggle-track"></span>
    <span class="toggle-knob"></span>
  </label>`;
  return`
  <div class="frame">
    <div style="font-size:44px;margin-bottom:8px">⚙️</div>
    <h2 style="font-size:1.7rem;letter-spacing:4px;margin:0 0 16px">IMPOSTAZIONI</h2>
    <div class="menu-c">
      <div style="text-align:left;margin-bottom:18px;border-bottom:1px solid rgba(115,24,31,.2);padding-bottom:14px">
        <h3 style="color:#73181F;letter-spacing:2px;font-size:.92rem;margin-bottom:14px">AUDIO</h3>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <span>Musica di sottofondo</span>
          ${tog('music',music,'settingsToggle("music")')}
        </div>
      </div>
      <div style="text-align:left;margin-bottom:18px;border-bottom:1px solid rgba(115,24,31,.2);padding-bottom:14px">
        <h3 style="color:#73181F;letter-spacing:2px;font-size:.92rem;margin-bottom:14px">GAMEPLAY</h3>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <span>Animazioni dadi</span>
          ${tog('diceAnim',diceAnim,'settingsToggle("diceAnim")')}
        </div>
      </div>
      <button class="btn btn-secondary" onclick="nav('home')">TORNA AL MENU</button>
    </div>
    <div style="font-size:.78rem;opacity:.55;color:#73181F;margin-top:14px">Le impostazioni vengono salvate automaticamente</div>
  </div>`;
}
function settingsToggle(key){S.settings[key]=!S.settings[key];persist();render();}


// ─── INIT ─────────────────────────────────────────────────────────────────────
load();

// Splash
const splashEl=document.getElementById('splash');
setTimeout(()=>splashEl.classList.add('fade'),1800);
setTimeout(()=>{
  splashEl.style.display='none';
  applyMusic();
},3100);

render();

</script>
<!-- 3D DICE OVERLAY -->
<div id="dice-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:20000;align-items:center;justify-content:center;font-family:'Times New Roman',Georgia,serif;padding:12px">
  <div style="background:#D8C7A1;border:3px solid #73181F;border-radius:14px;padding:22px 24px;max-width:520px;width:100%;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.6)">
    <h3 id="dice-ov-title" style="color:#73181F;letter-spacing:3px;font-size:1rem;margin:0 0 3px">LANCIA I DADI</h3>
    <p id="dice-ov-sub" style="font-size:.83rem;opacity:.68;margin:0 0 14px"></p>
    <div style="border-radius:10px;overflow:hidden;background:#120801;line-height:0">
      <canvas id="dice-canvas" style="width:100%;display:block"></canvas>
    </div>
    <div id="dice-ov-result" style="min-height:72px;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:10px 0 4px"></div>

      <button onclick="closeDiceOv()" style="flex:1;padding:11px;border-radius:8px;font-weight:bold;font-size:.88rem;cursor:pointer;font-family:inherit;letter-spacing:1px;background:transparent;color:#1a1007;border:2px solid #73181F;transition:filter .2s" onmouseover="this.style.filter='brightness(1.1)'" onmouseout="this.style.filter='none'">Chiudi</button>
