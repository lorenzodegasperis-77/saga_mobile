<html lang= "it">
<head>

            document.documentElement.classList.add('splash-skipped');

	<link rel="icon" type="image/x-icon" href="img/favicon.ico" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
	<title>SAGA	</title>
</head>
<body>
	<div id="splash-screen">
        <img src="img/SAGA_logo.png" alt="SAGA Splash Logo" class="splash-logo">
    </div>

    <div class="border-frame" id="main-menu">
		<h1>SAGA</h1>
        <div class="subtitle">Avventure Interattive</div>
		<div class="menu-container">
        <a href="adventures.html" class="btn-main primary">
            <span> ► </span>Nuova Avventura
        </a>

        <a href="characters.html" class="btn-main secondary">
            I miei personaggi
        </a>

        <a href="#" class="btn-main secondary">
            Carica Avventura
        </a>

        <div class="btn-grid">
            <a href="settings.html" class="btn-main secondary">Impostazioni</a>
            <a href="#" class="btn-main secondary">Crediti</a>
        </div>
		
		<div>
		<h3>Partite salvate</h3>
		</div>
<div class="saved-games" id="adventures-saved">
            LOREM IPSUM
        </div>

        <div class="social-footer">
            <a href="https://www.buymeacoffee.com/placeholder" target="_blank" class="btn-small" title="Offrimi un caffè">
                ☕
            </a>
            
            <a href="https://sito-manuale.it/placeholder" target="_blank" class="btn-small" title="Acquista il Manuale">
                📖
            </a>

            <button onclick="shareApp()" class="btn-small" title="Condividi App">
                🔗
            </button>

            <a href="https://api.whatsapp.com/send?text=Prova SAGA! Un'avventura interattiva epica: [LINK]" target="_blank" class="btn-small" title="Condividi su WhatsApp">
                💬
            </a>
        </div>
    </div> 

	</div>
	<br>
    <div class="version">Versione 1.0</div>

	<script>
	
	
	        function shareApp() {
            if (navigator.share) {
                navigator.share({
                    title: 'SAGA - Avventure Interattive',
                    text: 'Inizia la tua avventura su SAGA!',
                    url: 'https://play.google.com/store/apps/details?id=TUO_ID'
                }).catch(console.error);
            } else {
                alert("Link copiato negli appunti!");
                navigator.clipboard.writeText("https://play.google.com/store/apps/details?id=TUO_ID");
            }
        }
        document.addEventListener("DOMContentLoaded", function() {
            const splash = document.getElementById('splash-screen');
            const menu = document.getElementById('main-menu');

            if (!sessionStorage.getItem('splashShown')) {
                setTimeout(() => {
                    splash.classList.add('fade-out');
                    menu.classList.add('fade-in');
                    
                    setTimeout(() => {
                        splash.style.display = 'none';
                    }, 1500);
                }, 2000);

                sessionStorage.setItem('splashShown', 'true');
            } else {
                splash.style.display = 'none';
                menu.style.opacity = '1';
                menu.style.transform = 'scale(1)';
            }
        });
    </script>
	
</body>
</html>
