<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGA - Scheda Personaggio</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

    <div class="border-frame sheet-container">
        <div class="sheet-header">
            <div class="logo-circle small">
                <img src="../img/SAGA_logo.png" alt="SAGA logo">
            </div>
            <div class="char-basics">
                <input type="text" placeholder="Nome Eroe" class="input-blank name-field">
				<input type="text" placeholder="Sesso" class="input-blank name-field text-font-size 12pt">
                <div class="basics-grid">
                    <input type="text" placeholder="Lignaggio" class="input-blank">
                    <input type="text" placeholder="Professione" class="input-blank">
                    <input type="text" placeholder="Infanzia" class="input-blank">

                </div>
            </div>
        </div>

        <div class="sheet-grid">
            <div class="sheet-column">
                <div class="stat-section">
                    <h3>CARATTERISTICHE</h3>
                    <div class="stat-row">
                        <span>VIGORE</span>
                        <input type="number" value="10" class="stat-input">
                    </div>
                    <div class="stat-row">
                        <span>ISTINTO</span>
                        <input type="number" value="10" class="stat-input">
                    </div>
                    <div class="stat-row">
                        <span>MENTE</span>
                        <input type="number" value="10" class="stat-input">
                    </div>
                </div>

                <div class="stat-section">
                    <h3>COMBATTIMENTO</h3>
                    <div class="combat-grid">
                        <div class="combat-box">SALUTE<br><input type="text" value="20/20"></div>
                        <div class="combat-box">ENERGIA<br><input type="text" value="15/15"></div>
                        <div class="combat-box">DANNO<br><strong>1d6</strong></div>
                        <div class="combat-box">PROT.<br><strong>2</strong></div>
                    </div>
                </div>
            </div>

            <div class="sheet-column">
                <div class="stat-section">
                    <h3>EQUIPAGGIAMENTO</h3>
                    <select class="custom-select">
                        <option>Italiano 🇮🇹</option>
                        <option>English 🇬🇧</option>
                    <input type="text" placeholder="Mano Principale" class="input-line">
                    <input type="text" placeholder="Corpo (Armatura)" class="input-line">
                </div>

                <div class="stat-section">
                    <h3>INVENTARIO</h3>
                    <textarea placeholder="Oggetti, monete, razioni..." rows="5" class="input-area"></textarea>
                    <div class="version" style="margin-top:5px; text-align:right;">Carico Max: VIG x 2</div>
                </div>
            </div>
        </div>

        <div class="stat-section">
            <h3>TALENTI E ABILITÀ SPECIALI</h3>
            <textarea placeholder="Descrivi qui i tuoi talenti e poteri..." rows="4" class="input-area"></textarea>
        </div>

        <div class="btn-grid">
            <a href="../characters.html" class="btn-main secondary">INDIETRO</a>
            <a href="#" class="btn-main primary">SALVA</a>
        </div>
    </div>

</body>
</html>
