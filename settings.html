<!DOCTYPE html>
<html lang="it">
<link rel="icon" type="image/x-icon" href="img/favicon.ico" />

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAGA - Impostazioni</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

    <div class="border-frame" id="main-menu">
        <div>
        <img src="img/ico/gear.png" alt="Gear icon">
        </div>
        
        <h1>IMPOSTAZIONI</h1>
        <div class="subtitle">Personalizza la tua esperienza</div>

        <div class="menu-container">
            <div class="stat-section">
                <h3>AUDIO</h3>
                <div class="stat-row">
                    <span>Effetti Sonori</span>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
				<br>
                <div class="stat-row">
                    <span>Musica</span>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="stat-section">
                <h3>GAMEPLAY</h3>
                <div class="stat-row">
                    <span>Animazioni dadi</span>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
				<br>
                <div class="stat-row">
                    <span>Lingua</span>
                    <select class="custom-select">
                        <option>Italiano 🇮🇹</option>
                        <option>English 🇬🇧</option>
                    </select>
                </div>
            </div>

            <a href="index.html" class="btn-main primary">TORNA AL MENU</a>
        </div>

        <div class="version">Le impostazioni vengono salvate automaticamente</div>
    </div>

</body>
</html>
