<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="img/favicon.ico" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#D8C7A1">
<title>SAGA — Avventure Interattive</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;min-height:100svh;background:#D8C7A1;font-family:'Times New Roman',Georgia,serif;color:#1a1007;}body{padding-bottom:env(safe-area-inset-bottom);}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:rgba(115,24,31,.08)}::-webkit-scrollbar-thumb{background:#73181F;border-radius:3px}
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 0;position:relative;}
.bg-overlay{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(115,24,31,.07) 0%,transparent 65%),repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(0,0,0,.012) 40px,rgba(0,0,0,.012) 80px);pointer-events:none;z-index:0;}
@keyframes creditsScroll{0%{transform:translateY(100%)}100%{transform:translateY(-100%)}}
@keyframes splashPulse{from{filter:drop-shadow(0 0 16px rgba(115,24,31,.5));}to{filter:drop-shadow(0 0 40px rgba(115,24,31,.9));}}
/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:#0c0805;display:flex;align-items:center;justify-content:center;transition:opacity 1.2s ease;}
#splash.fade{opacity:0;pointer-events:none;}
/* FRAME */
.frame{background:#D8C7A1;border:3px solid #73181F;border-radius:12px;padding:28px 46px;width:min(620px,95vw);text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.18),inset 0 0 50px rgba(115,24,31,.03);position:relative;z-index:1;}
/* BTN */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 18px;border-radius:8px;font-weight:bold;font-size:.9rem;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all .2s;border:2px solid #73181F;}
.btn:hover:not(:disabled){filter:brightness(1.15);transform:scale(1.02);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:#73181F;color:white;}
.btn-secondary{background:transparent;color:#1a1007;}
/* BADGE */
.badge{background:#73181F;color:white;padding:2px 8px;border-radius:5px;font-size:.7rem;font-weight:bold;}
/* CHOICE CARD */
.cc-card{border:1.5px solid #84785E;background:rgba(255,255,255,.3);padding:13px;margin-bottom:8px;border-radius:6px;cursor:pointer;transition:all .2s;}
.cc-card:hover{background:rgba(115,24,31,.06);}
.cc-card.sel{border:2px solid #73181F;background:rgba(115,24,31,.1);}
.cc-card.dis{opacity:.4;cursor:not-allowed;}
/* INPUT */
.input-line{width:100%;background:rgba(0,0,0,.04);border:none;border-left:3px solid #73181F;padding:11px 10px;font-family:'Times New Roman',serif;font-size:16px;color:#1a1007;outline:none;margin-bottom:8px;}
/* MENU CONTAINER */
.menu-c{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px;margin:0 auto;}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:9999;}
.modal{background:#D8C7A1;border:2px solid #73181F;border-radius:10px;padding:26px;max-width:460px;width:90%;box-shadow:0 10px 30px rgba(0,0,0,.5);}
/* BAR */
.bar-outer{position:relative;height:26px;border-radius:6px;overflow:hidden;border:1px solid rgba(0,0,0,.25);box-shadow:inset 0 2px 4px rgba(0,0,0,.35);margin-bottom:8px;}
.bar-inner{height:100%;transition:width .5s ease-out;}
.bar-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:.88rem;text-shadow:1px 1px 2px #000;letter-spacing:1px;}
/* DOT */
.dot{width:13px;height:13px;border-radius:50%;cursor:pointer;border:1.5px solid #73181F;transition:all .2s;flex-shrink:0;display:inline-block;background:transparent;}
.dot.on{background:#73181F;box-shadow:0 0 5px #73181F;}
/* TOGGLE */
.toggle-wrap{position:relative;display:inline-block;width:44px;height:24px;cursor:pointer;flex-shrink:0;}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;border-radius:24px;transition:.3s;background:#ccc;}
.toggle-wrap input:checked+.toggle-track{background:#73181F;}
.toggle-knob{position:absolute;height:18px;width:18px;bottom:3px;left:3px;border-radius:50%;background:white;transition:.3s;}
.toggle-wrap input:checked~.toggle-knob{left:23px;}
/* CHAR CARD */
.char-card{background:rgba(196,176,138,.3);border:2px solid #73181F;border-radius:10px;padding:14px 18px;cursor:pointer;transition:all .18s;margin-bottom:10px;}
.char-card:hover{background:rgba(196,176,138,.6);transform:translateX(3px);}
/* EQUIP CARD */
.equip-card{padding:13px;margin-bottom:8px;border-radius:6px;border:1.5px solid #84785E;background:rgba(255,255,255,.3);}
.equip-card.sel{border:2px solid #73181F;background:rgba(115,24,31,.1);}
/* SMALL BTN */
.sm-btn{border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-weight:bold;font-size:1.1rem;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;background:#73181F;color:white;}
.sm-btn:disabled{background:#ccc;cursor:not-allowed;}
/* SECTION HDR */
.sec-hdr{font-weight:bold;color:#73181F;letter-spacing:2px;font-size:.8rem;margin:14px 0 5px;border-bottom:1px solid rgba(115,24,31,.2);padding-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
/* SHEET tab btn */
.tab-btn{padding:7px 15px;border:2px solid #73181F;border-radius:6px;background:transparent;color:#1a1007;cursor:pointer;font-family:inherit;font-weight:bold;font-size:.82rem;letter-spacing:1px;transition:all .2s;}
.tab-btn.active{background:#73181F;color:white;}

/* ── MOBILE RESPONSIVE ──────────────────────────────────── */
/* Touch-target baseline */
.btn{min-height:48px;}
.tab-btn{min-height:44px;}
.sm-btn{width:36px;height:36px;font-size:1.2rem;}
/* iOS input zoom prevention */
input,select,textarea{font-size:16px !important;}
/* Remove hover transform on touch devices */
@media(hover:none){
  .btn:hover:not(:disabled){filter:none;transform:none;}
  .char-card:hover{transform:none;}
}
@media(max-width:640px){
  /* App container */
  #app{padding:0;justify-content:flex-start;}
  /* Frame → full-width, no side borders/radius on small screens */
  .frame{width:100vw;max-width:100vw;border-left:none;border-right:none;border-radius:0;padding:18px 16px;min-height:100svh;}
  /* Buttons */
  .btn{font-size:.9rem;letter-spacing:.5px;}
  .btn-group-2col{grid-template-columns:1fr 1fr;display:grid;gap:8px;}
  /* Cards */
  .cc-card{padding:11px 10px;}
  .equip-card{padding:10px 8px;}
  .char-card{padding:12px 14px;}
  /* Modal */
  .modal{width:96%;padding:20px 14px;border-radius:8px;}
  /* Tabs — full width scrollable row */
  .tab-row{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
  .tab-row::-webkit-scrollbar{display:none;}
  .tab-btn{flex-shrink:0;padding:10px 14px;font-size:.8rem;}
  /* Sheet: single column grid */
  .sh-2col{grid-template-columns:1fr !important;}
  /* CREATE — layout: sidebar on top as strip */
  .cc-layout{flex-direction:column !important;padding:0 !important;width:100vw !important;gap:0 !important;}
  .cc-sidebar{width:100% !important;position:sticky !important;top:0 !important;z-index:100 !important;border-radius:0 !important;border-left:none !important;border-right:none !important;border-top:none !important;padding:10px 14px !important;display:flex !important;flex-direction:row !important;flex-wrap:wrap !important;gap:6px 14px !important;align-items:center !important;background:#D8C7A1 !important;box-shadow:0 3px 12px rgba(0,0,0,.18) !important;}
  .cc-sidebar h3{width:100%;margin:0 0 4px !important;font-size:.9rem !important;border-bottom:none !important;padding-bottom:0 !important;}
  .cc-sidebar p{display:none !important;}
  .cc-sidebar hr{display:none !important;}
  .cc-sidebar-stat{display:flex;align-items:center;gap:4px;background:rgba(115,24,31,.1);border-radius:6px;padding:3px 8px;font-size:.78rem;font-weight:bold;}
  .cc-main{border-left:none !important;border-right:none !important;border-radius:0 !important;padding:16px !important;}
  /* LEVEL UP — same pattern */
  .lu-layout{flex-direction:column !important;padding:0 !important;width:100vw !important;gap:0 !important;}
  .lu-sidebar{width:100% !important;position:sticky !important;top:0 !important;z-index:100 !important;border-radius:0 !important;border-left:none !important;border-right:none !important;border-top:none !important;padding:10px 14px !important;background:#D8C7A1 !important;box-shadow:0 3px 12px rgba(0,0,0,.18) !important;}
  .lu-main{border-left:none !important;border-right:none !important;border-radius:0 !important;padding:16px !important;}
  /* SHEET frame */
  .sh-frame{border-left:none !important;border-right:none !important;border-radius:0 !important;padding:16px 14px !important;min-height:100svh;width:100vw !important;max-width:100vw !important;}
  /* HP/EN big buttons */
  .adj-btn{min-width:52px !important;min-height:44px !important;font-size:1.1rem !important;}
  /* Credits overlay */
  #credits-overlay>div{border-radius:0 !important;}
  /* Dice overlay */
  #dice-overlay>div{max-width:100vw !important;width:100vw !important;border-left:none !important;border-right:none !important;border-radius:12px 12px 0 0 !important;position:fixed;bottom:0;padding:18px 16px 28px !important;}
  #dice-overlay{align-items:flex-end !important;}
  /* Step counter */
  .step-indicator{font-size:.72rem;}
  /* Nav buttons in creation */
  .cc-nav-btns{flex-wrap:wrap;}
  /* Character list */
  .sh-origins-row{flex-direction:column !important;gap:4px !important;font-size:.82rem;}
  /* Home: reduce title size */
  .home-title{font-size:2.4rem !important;letter-spacing:4px !important;}
  .home-subtitle{margin-bottom:20px !important;}
  /* Settings frame */
  .settings-frame{min-height:100svh !important;border-radius:0 !important;border-left:none;border-right:none;}
}
@media(max-width:380px){
  .cc-sidebar-stat{font-size:.7rem;padding:2px 6px;}
  .tab-btn{font-size:.72rem;padding:8px 10px;}
  .btn{font-size:.82rem;}
}
/* CARD INFO */
.card{background:rgba(196,176,138,.45);border:2px solid #73181F;border-radius:10px;padding:15px;margin-bottom:12px;text-align:left;}
</style>
</head>
<body>
<div class="bg-overlay"></div>
<div id="splash">
  <div style="text-align:center">
